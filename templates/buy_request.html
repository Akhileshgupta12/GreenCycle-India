{% load static %}
<link rel="stylesheet" href="{% static 'css/style.css' %}">
{% include 'navbar.html' %}

<style>

body{
    background: linear-gradient(135deg,#0f172a,#1e293b,#334155);
    font-family:Poppins;
}

.container{
    max-width:600px;
    margin:50px auto;
    background:#fde68a;
    padding:40px;
    border-radius:20px;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

img{
    width:100%;
    height:300px;
    object-fit:cover;
    border-radius:15px;
    margin-bottom:20px;
}

input, textarea{
    width:100%;
    padding:14px;
    margin:12px 0;
    border:none;
    border-radius:10px;
}

button{
    width:100%;
    padding:14px;
    background:#16a34a;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#15803d;
}

.success{
    color:green;
    text-align:center;
    margin-top:15px;
    font-weight:bold;
}

</style>

<div class="container">

    <h1>🛒 Buy Waste Request</h1>

    <img src="{{ waste.image.url }}">

    <h2>{{ waste.material }}</h2>

    <p><b>Quantity:</b> {{ waste.quantity }} KG</p>

    <p><b>Price:</b> ₹{{ waste.price }}/kg</p>

    <p><b>Location:</b> {{ waste.location }}</p>

    <form method="POST">

        {% csrf_token %}

        <input type="text"
               name="buyer_name"
               placeholder="Enter Your Name"
               required>

        <input type="text"
               name="mobile"
               placeholder="Enter Mobile Number"
               required>

        <input type="number"
               name="quantity"
               placeholder="Required Quantity (KG)"
               required>

        <textarea
            name="address"
            placeholder="Enter Full Address"
            rows="4"
            required></textarea>

        <button type="submit">

     <select name="payment_method" required>
         <option value="">
             Select Payment Method
         </option>

         <option value="Cash on Delivery">
             Cash on Delivery
          </option>

         <option value="Online Payment">
              Online Payment
         </option>

    </select>
            Submit Request
        </button>

    </form>

{% if error %}
<p style="color:red; text-align:center; font-weight:bold;">
    {{ error }}
</p>
{% endif %}


    {% if success %}
    <p class="success">
        {{ success }}
    </p>
    {% endif %}
</div>
