{% load static %}

<link rel="stylesheet" href="{% static 'css/style.css' %}">

{% include 'navbar.html' %}

<style>

body{
    background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
    font-family:Poppins;
}

.box{
    max-width:500px;
    margin:80px auto;
    background:#fde68a;
    padding:40px;
    border-radius:20px;
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:14px;
    margin:12px 0;
    border:none;
    border-radius:10px;
}

button{
    width:100%;
    padding:14px;
    background:#16a34a;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

.error{
    color:red;
    text-align:center;
    margin-top:10px;
}

</style>

<div class="box">

    <h2>🛒 Buyer Login</h2>

    <form method="POST">

        {% csrf_token %}

        <input type="email"
               name="email"
               placeholder="Enter email"
               required>

        <input type="password"
               name="password"
               placeholder="Enter password"
               required>

        <button type="submit">
            Login
        </button>

    </form>

    <p class="error">
        {{ error }}
    </p>

    <p style="text-align:center; margin-top:15px;">

    New Buyer?

    <a href="/buyer-register/">
        Register here
    </a>

</p>

</div>
