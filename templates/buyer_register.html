{% load static %}

<link rel="stylesheet" href="{% static 'css/style.css' %}">

{% include 'navbar.html' %}

<style>

body{
    background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
    font-family:Poppins;
}

.box{
    max-width:500px;
    margin:80px auto;
    background:#fde68a;
    padding:40px;
    border-radius:20px;
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:14px;
    margin:12px 0;
    border:none;
    border-radius:10px;
}

button{
    width:100%;
    padding:14px;
    background:#16a34a;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#15803d;
}

.error{
    color:red;
    text-align:center;
    margin-top:10px;
}

</style>

<div class="box">

    <h2>🛒 Buyer Register</h2>

    <form method="POST">

        {% csrf_token %}

        <input type="text"
              name="name"
               placeholder="Enter your name"
               required>

        <input type="email"
               name="email"
               placeholder="Enter your email"
               required>

        <input type="password"
               name="password"
               placeholder="Enter password"
               required>
        
        <input type="text"
             name="city"
             placeholder="Enter City"
             required>

        <input type="text"
              name="state"
              placeholder="Enter State"
              required>

        <input type="text"
               name="pincode"
               placeholder="Enter Pincode"
                required>       

        <button type="submit">
            Register
        </button>

    </form>

    </form>

<p class="error">
    {{ error }}
</p>

<p style="color:green; text-align:center;">
    {{ success }}
</p>

<p style="text-align:center; margin-top:15px;">

    Already registered?

    <a href="/buyer-login/">
        Login
    </a>

</p>

</div>
