
{% load static %}

<link rel="stylesheet" href="{% static 'css/style.css' %}">

{% include 'navbar.html' %}

<style>

body{
    background:#334155;
    font-family:Poppins;
}

.container{

    width:90%;
    max-width:600px;

    margin:50px auto;

    background:white;

    padding:35px;

    border-radius:20px;

    box-shadow:0 4px 15px rgba(0,0,0,0.2);
}

.container h1{

    text-align:center;

    margin-bottom:25px;
}

.container input{

    width:100%;

    padding:14px;

    margin-top:15px;

    border:1px solid #ccc;

    border-radius:10px;

    font-size:16px;
}

.container button{

    width:100%;

    padding:14px;

    margin-top:20px;

    background:#16a34a;

    color:white;

    border:none;

    border-radius:10px;

    font-size:18px;

    cursor:pointer;
}

.container button:hover{

    background:#15803d;
}

</style>

<div class="container">

    <h1>
        ✏️ Edit Waste
    </h1>

    <form method="POST"
          enctype="multipart/form-data">

        {% csrf_token %}

        <input type="text"
               name="location"
               value="{{ waste.location }}"
               placeholder="Location">

        <input type="text"
               name="city"
               value="{{ waste.city }}"
               placeholder="City">

        <input type="text"
               name="state"
               value="{{ waste.state }}"
               placeholder="State">

        <input type="text"
               name="pincode"
               value="{{ waste.pincode }}"
               placeholder="Pincode">

        <input type="number"
               name="quantity"
               value="{{ waste.quantity }}"
               placeholder="Quantity">

        <input type="file"
               name="image">

        <button type="submit">

            ✅ Update Waste

        </button>

    </form>

</div>
