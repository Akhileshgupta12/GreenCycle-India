{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Coconut Waste</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>

        body{
            margin:0;
            font-family:'Poppins', sans-serif;
            background:linear-gradient(135deg, #43e97b, #38f9d7);
        }

        .container{
            max-width:900px;
            margin:40px auto;
            padding:30px;
            border-radius:20px;
            background:linear-gradient(135deg, #ffffff, #eaffea);
            box-shadow:0 10px 30px rgba(0,0,0,0.15);
        }

        /* 🔙 BACK BUTTON */
        .back-btn{
            display:inline-block;
            margin-bottom:15px;
            text-decoration:none;
            color:#14532d;
            font-weight:bold;
        }

        .back-btn i{
            margin-right:6px;
        }

        .hero{
            text-align:center;
        }

        .hero img{
            width:100%;
            height:300px;
            object-fit:contain;
        }

        h1{
            color:#14532d;
        }

        .price{
            color:green;
            font-weight:bold;
        }

        .bio{
            margin-top:15px;
            line-height:1.6;
        }

        .uses{
            display:grid;
            grid-template-columns:repeat(auto-fit, minmax(200px,1fr));
            gap:15px;
            margin-top:15px;
        }

        .use-box{
            background:#f0fff4;
            padding:15px;
            border-radius:10px;
            text-align:center;
        }

        .demand{
            margin-top:15px;
            font-weight:bold;
        }

        .sell-btn{
            margin-top:20px;
            width:100%;
            padding:15px;
            background:linear-gradient(135deg, #11998e, #38ef7d);
            color:white;
            border:none;
            border-radius:10px;
            cursor:pointer;
        }

    </style>

</head>

<body>

<div class="container">

    <!-- 🔙 BACK BUTTON -->
    <a href="/" class="back-btn">
        <i class="fas fa-arrow-left"></i> Back
    </a>

    <div class="hero">
        <img src="{% static 'images/coconut.png' %}">
        <h1>🥥 Coconut Waste</h1>
        <p class="price">₹5 – ₹10 per kg</p>
    </div>

    <p class="bio">
        Coconut waste includes shell and husk which are highly useful in
        coir industry, charcoal making and eco-friendly products.
    </p>

    <h2>Uses</h2>
    <div class="uses">
        <div class="use-box">Coir Products</div>
        <div class="use-box">Charcoal</div>
        <div class="use-box">Handicrafts</div>
        <div class="use-box">Activated Carbon</div>
    </div>

    <p class="demand">🔥 Demand: High</p>

    <a href="/sell/">
    <button class="sell-btn">Sell Now</button>
</a>
</div>

</body>
</html>
