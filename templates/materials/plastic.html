{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Plastic Waste</title>

<style>
body{
    margin:0;
    font-family:Poppins;
    background:linear-gradient(135deg, #fddb92, #d1fdff);
}

.container{
    max-width:900px;
    margin:40px auto;
    padding:30px;
    border-radius:20px;
    background:white;
}

.hero img{
    width:100%;
    height:300px;
    object-fit:contain;
}

.price{ color:green; font-weight:bold; }

.sell-btn{
    width:100%;
    padding:12px;
    background:#2196f3;
    color:white;
    border:none;
    border-radius:10px;
}
</style>

</head>

<body>

<div class="container">
    <a href="/" style="text-decoration:none; font-weight:bold; color:#14532d; font-size:18px;">
    ⬅ Back
</a>
    <div class="hero">
        <img src="{% static 'images/plastic.png' %}">
        <h1>♻️ Plastic Waste</h1>
        <p class="price">₹10 – ₹25 per kg</p>
    </div>

    <p>
        Plastic waste can be recycled into new products like containers,
        fibers, and construction materials.
    </p>

    <h2>Uses</h2>
    <ul>
        <li>Recycled plastic products</li>
        <li>Road construction</li>
        <li>Packaging industry</li>
    </ul>

    <p><b>Demand:</b> Medium ⚡</p>

    <a href="/sell/">
    <button class="sell-btn">Sell Now</button>
</a>
</div>

</body>
</html>
