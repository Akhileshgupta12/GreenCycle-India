<!DOCTYPE html>
<html>
<head>
<title>Register</title>
{% load static %}
<link rel="stylesheet" href="{% static 'css/style.css' %}">
<style>
body{
    font-family:Poppins;
    background:linear-gradient(135deg,#43e97b,#38f9d7);
}

/* 🔥 BOX बड़ा */
.box{
    max-width:500px;        /* पहले 400px था */
    margin:100px auto;
    background:white;
    padding:40px;           /* padding बढ़ाया */
    border-radius:20px;
    text-align:center;
}

/* 🔥 Heading बड़ा */
h2{
    font-size:28px;
}

/* 🔥 Input बड़ा */
input{
    width:100%;
    padding:14px;           /* पहले 10px था */
    margin:12px 0;
    font-size:16px;
}

/* 🔥 Button बड़ा */
button{
    width:100%;
    padding:14px;
    background:green;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}
button:hover{
    background:#0f7a2f;
}
@media(max-width:600px){
    .box{
        margin:40px 15px;
        padding:25px;
    }
}
.back-btn{
    display:block;        
    text-align:left;      
    margin-bottom:15px;
    text-decoration:none;
    font-weight:bold;
    color:#14532d;
    font-size:18px;
}
</style>

</head>

<body>
{% include 'navbar.html' %}
<div class="box">
<a href="/" class="back-btn">← Go Back</a>
<h2>Register</h2>

<form method="POST">
    {% csrf_token %}

    <input type="text" name="name" placeholder="Name">
    <input type="email" name="email" placeholder="Email">
    <input type="password" name="password" placeholder="Password">
    <input type="text"name="address"placeholder="Enter Address"required>
    <input type="text"name="city" placeholder="Enter City"required>
    <input type="text"name="state"placeholder="Enter State"required>
    <input type="text"name="pincode"placeholder="Enter Pincode"required>
    <button type="submit">Register</button>
    
</form>
<p style="color:red;">{{ error }}</p>
<p>Already user? <a href="/login/">Login</a></p>

</div>

</body>
</html>

{% include 'footer.html' %}
